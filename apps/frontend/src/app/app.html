<div *ngIf="isLoggedIn; else authRoute" class="app-container">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Main Content Area -->
  <div class="main-content">
    <div
      class="h-screen overflow-hidden flex flex-col items-center relative px-0 sm:px-4 pt-4 sm:pt-6 pb-2"
    >
      <!-- Animated glass background -->
      <div class="glass-bg">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
      </div>

      <!-- Logo + Name -->
      <div class="flex flex-col items-center gap-2 z-10 mb-4">
        <div class="flex items-center gap-3">
          <svg width="34" height="42" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Docent logo" class="logo-svg">
            <!-- Document body -->
            <path d="M3 0 H23 L33 10 V36 H3 Z" class="logo-path-main"/>
            <!-- Corner fold -->
            <path d="M23 0 L33 10 H23 Z" class="logo-path-fold"/>
            <!-- Content lines -->
            <rect x="8" y="16" width="18" height="2" rx="1" class="logo-rect-content" fill-opacity="0.6"/>
            <rect x="8" y="22" width="13" height="2" rx="1" class="logo-rect-content" fill-opacity="0.6"/>
            <!-- Speech bubble -->
            <rect x="3" y="29" width="20" height="13" rx="4" class="logo-bubble"/>
            <!-- Bubble tail pointing up into document -->
            <path d="M16 29 L21 22 L23 29 Z" class="logo-bubble"/>
            <!-- Typing dots -->
            <circle cx="8"  cy="35.5" r="1.8" class="logo-dot"/>
            <circle cx="13" cy="35.5" r="1.8" class="logo-dot"/>
            <circle cx="18" cy="35.5" r="1.8" class="logo-dot"/>
          </svg>
          <span class="text-3xl sm:text-4xl font-bold text-primary tracking-tight">Docent</span>
        </div>
        <p class="text-xs text-secondary font-medium tracking-widest uppercase">Ask your documents</p>
      </div>

      <!-- Uploaded PDFs List -->
      <div *ngIf="uploadedFiles.length > 0" class="w-full max-w-[820px] flex flex-wrap gap-2 z-10 mb-2">
        <span
          *ngFor="let file of uploadedFiles"
          class="pill-base"
          [ngClass]="{
            'pill-uploaded':  file.status === 'uploaded',
            'pill-uploading': file.status === 'uploading',
            'pill-deleting':  file.status === 'deleting'
          }"
        >
          <span class="truncate max-w-xs">{{ file.name }}</span>
          <button
            *ngIf="file.status === 'uploaded'"
            (click)="deleteFile(file.name)"
            class="ml-1 hover:text-red-400 transition leading-none opacity-70 hover:opacity-100"
            aria-label="Delete file"
            title="Delete file"
          >✕</button>
        </span>
      </div>

      <!-- Empty state -->
      <div *ngIf="uploadedFiles.length === 0" class="w-full max-w-[820px] z-10 mb-2 text-center text-sm text-muted">
        No PDFs uploaded yet. Click + to upload one.
      </div>

      <!-- Chat Window with Input at Bottom -->
      <div #chatWindow class="chat-window flex flex-col z-10">
        <div class="flex-1 min-h-0 flex flex-col">
          <app-message-list
            [messages]="messages"
            [isLoading]="isLoading"
            [loadingPhase]="loadingPhase"
          ></app-message-list>
        </div>
        <app-chat-input
          [query]="query"
          [selectedFile]="selectedFile"
          [uploadError]="uploadError"
          [dragOver]="dragOver"
          (queryChange)="query = $event"
          (send)="send()"
          (fileSelected)="onFileSelected($event)"
          (upload)="upload()"
          (dragOverEvent)="onDragOver($event)"
          (dragLeaveEvent)="onDragLeave($event)"
          (dropEvent)="onDrop($event)"
          aria-label="Chat input area"
        ></app-chat-input>
      </div>

      <!-- Toast notification -->
      <div
        *ngIf="toastMessage"
        class="fixed top-4 left-1/2 transform -translate-x-1/2 toast-glass px-5 py-2.5 rounded-xl shadow-lg z-50 text-sm font-medium flex items-center gap-2"
        [class.toast-success]="toastType === 'success'"
        [class.toast-error]="toastType === 'error'"
        [class.toast-info]="toastType === 'info'"
        [class.animate-fade-in]="!toastFadingOut"
        [class.animate-fade-out]="toastFadingOut"
        role="status"
        aria-live="polite"
      >
        <span *ngIf="toastType === 'success'" style="color: var(--color-success)">&#10003;</span>
        <span *ngIf="toastType === 'error'" style="color: var(--color-error)">&#10007;</span>
        <span *ngIf="toastType === 'info'" style="color: var(--color-accent)">&#9432;</span>
        {{ toastMessage }}
      </div>
    </div>
    <!-- Modern Input Area -->
    <form class="chat-input-area z-10 flex items-center gap-2 p-2" (ngSubmit)="send()" style="background:transparent;box-shadow:none;">
      <label class="flex items-center cursor-pointer m-0">
        <input #fileInput type="file" (change)="onFileSelected($event)" class="hidden" aria-label="Upload file" />
        <button type="button" (click)="fileInput.click(); $event.preventDefault(); $event.stopPropagation();" aria-label="Upload file"
          class="flex items-center justify-center w-10 h-10 rounded-full bg-[#FFFFE3] border border-[#CBCBCB] text-[#6D8196] hover:bg-[#6D8196] hover:text-white focus:outline-none focus:ring-2 focus:ring-[#6D8196] transition mr-2"
        >
          <!-- Heroicons outline plus -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6" role="img" aria-label="Upload">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
        </button>
      </label>
      <input
        [(ngModel)]="query"
        name="query"
        autocomplete="off"
        (keyup.enter)="send()"
        placeholder="Ask something from the document..."
        class="flex-1 bg-[#FFFFE3] border-2 border-[#CBCBCB] text-[#4A4A4A] placeholder-[#6D8196] font-medium focus:border-[#6D8196] focus:ring-2 focus:ring-[#6D8196] transition rounded-xl px-4 py-2"
        style="min-width:0;"
      />
      <button
        type="submit"
        aria-label="Send message"
        class="flex items-center justify-center w-10 h-10 rounded-full bg-[#6D8196] text-[#FFFFE3] border border-[#6D8196] hover:bg-[#4A4A4A] hover:text-white hover:border-[#4A4A4A] focus:outline-none focus:ring-2 focus:ring-[#6D8196] transition ml-2"
        title="Send"
      >
        <!-- Heroicons solid paper-airplane -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5" role="img" aria-label="Send">
          <path d="M2.25 12L21.75 3.75c.69-.29 1.41.43 1.12 1.12L12 21.75l-3.38-7.5-7.5-3.38c-.69-.29-.43-1.41.12-1.12z" />
        </svg>
      </button>
    </form>
  </div>
</div>

<ng-template #authRoute>
  <router-outlet></router-outlet>
</ng-template>
