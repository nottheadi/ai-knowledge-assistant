<!-- Modify app ui such that it auto-scrolls to the bottom of the chat window every time a new message is added but at the same time there shouldn't be any browser scrollbars it should be scrollable for inside the message box to see previous messages. Also ensure that the input field is always visible at the bottom. And give each message bacground a glassmorphism effect -->
<div
  class="min-h-screen flex flex-col items-center justify-center relative p-0 sm:p-4 overflow-x-hidden"
>
  <!-- Animated glass background -->
  <div class="glass-bg">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
  </div>

  <!-- Toast Container -->
  <app-toast-container></app-toast-container>

  <!-- Title -->
  <h1
    class="text-2xl sm:text-3xl font-bold mb-4 text-gray-800 text-center drop-shadow-lg tracking-tight z-10"
  >
    AI Knowledge Assistant
  </h1>

  <!-- Uploaded PDFs List -->
  <div *ngIf="uploadedFiles.length > 0" class="w-full max-w-2xl z-10 mb-4">
    <div class="text-sm font-semibold text-gray-600 mb-2 px-2">
      📁 Uploaded Files ({{ uploadedFiles.length }})
    </div>
    <div class="space-y-2">
      <div
        *ngFor="let file of uploadedFiles"
        class="file-card"
      >
        <div class="file-card-content">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">{{ file.name }}</div>
            <div class="file-meta">
              {{ formatFileSize(file.size) }} • {{ getTimeAgo(file.uploadedAt) }}
            </div>
          </div>
        </div>
        <button
          (click)="deleteFile(file.name)"
          class="delete-btn"
          aria-label="Delete file"
          title="Delete file"
        >
          ✕
        </button>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoadingFiles && uploadedFiles.length === 0" class="w-full max-w-2xl z-10 mb-6 text-center">
    <div class="text-4xl mb-2">📤</div>
    <div class="text-sm text-gray-500">No files uploaded yet. Click the + button to upload a PDF to get started.</div>
  </div>

  <!-- Chat Window with Input at Bottom -->
  <div #chatWindow class="chat-window flex flex-col z-10" style="min-height: 60vh; height: 75vh">
    <div class="flex-1 min-h-0 flex flex-col">
      <app-message-list
        [messages]="messages"
        [isLoading]="isLoading"
        [loadingPhase]="loadingPhase"
      ></app-message-list>
    </div>
    <app-chat-input
      [query]="query"
      [selectedFile]="selectedFile"
      (queryChange)="query = $event"
      (send)="send()"
      (fileSelected)="onFileSelected($event)"
      aria-label="Chat input area"
    ></app-chat-input>
  </div>
</div>
<router-outlet></router-outlet>
