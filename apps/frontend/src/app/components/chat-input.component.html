<form class="chat-input-area z-10 flex items-center gap-2 p-2" (ngSubmit)="send.emit()" style="background:transparent;box-shadow:none;">
  <label class="flex items-center cursor-pointer m-0">
    <input #fileInput type="file" (change)="fileSelected.emit($event)" class="hidden" aria-label="Upload file" />
    <button type="button" (click)="fileInput.click(); $event.preventDefault(); $event.stopPropagation();" aria-label="Upload file"
      class="flex items-center justify-center w-10 h-10 rounded-full bg-[#FFFFE3] border border-[#CBCBCB] text-[#6D8196] hover:bg-[#6D8196] hover:text-white focus:outline-none focus:ring-2 focus:ring-[#6D8196] transition mr-2"
    >
      <!-- Heroicons outline plus -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6" role="img" aria-label="Upload">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
    </button>
  </label>
  <input
    [(ngModel)]="query"
    (ngModelChange)="queryChange.emit($event)"
    name="query"
    autocomplete="off"
    (keyup.enter)="send.emit()"
    placeholder="Ask something from the document..."
    class="flex-1 bg-[#FFFFE3] border-2 border-[#CBCBCB] text-[#4A4A4A] placeholder-[#6D8196] font-medium focus:border-[#6D8196] focus:ring-2 focus:ring-[#6D8196] transition rounded-xl px-4 py-2"
    style="min-width:0;"
  />
  <button
    type="submit"
    aria-label="Send message"
    class="flex items-center justify-center w-10 h-10 rounded-full bg-[#6D8196] text-[#FFFFE3] border border-[#6D8196] hover:bg-[#4A4A4A] hover:text-white hover:border-[#4A4A4A] focus:outline-none focus:ring-2 focus:ring-[#6D8196] transition ml-2"
    title="Send"
  >
    <!-- Heroicons solid paper-airplane -->
    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5" role="img" aria-label="Send">
      <path d="M2.25 12L21.75 3.75c.69-.29 1.41.43 1.12 1.12L12 21.75l-3.38-7.5-7.5-3.38c-.69-.29-.43-1.41.12-1.12z" />
    </svg>
  </button>
</form>
