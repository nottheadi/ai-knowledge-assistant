<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Glass card -->
    <div class="backdrop-blur-lg bg-white/10 border border-white/20 rounded-lg shadow-2xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white mb-2">AI Assistant</h1>
        <p class="text-slate-300">Sign in to your account</p>
      </div>

      <!-- Error Message -->
      @if (errorMessage) {
      <div class="bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-lg mb-6">
        {{ errorMessage }}
      </div>
      }

      <!-- Login Form -->
      <form (ngSubmit)="onLogin()" class="space-y-4">
        <!-- Username Field -->
        <div>
          <label for="username" class="block text-sm font-medium text-slate-200 mb-2">
            Username
          </label>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter your username"
            class="w-full px-4 py-2 bg-white/5 border border-white/20 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500/50 focus:bg-white/10 transition"
          />
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-200 mb-2">
            Password
          </label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2 bg-white/5 border border-white/20 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500/50 focus:bg-white/10 transition"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-2 px-4 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition duration-200 mt-6"
        >
          @if (isLoading) {
          <span class="inline-block animate-spin mr-2">⏳</span>
          Signing in...
          } @else {
          Sign In
          }
        </button>
      </form>

      <!-- Demo Credentials -->
      <div class="mt-8 p-4 bg-blue-500/10 border border-blue-500/30 rounded-lg">
        <p class="text-sm text-slate-300 mb-2">
          <strong>Demo Credentials:</strong>
        </p>
        <p class="text-sm text-slate-400">Username: <code class="font-mono">admin</code></p>
        <p class="text-sm text-slate-400">Password: <code class="font-mono">password123</code></p>
      </div>
    </div>
  </div>
</div>
