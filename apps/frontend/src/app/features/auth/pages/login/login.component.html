<div class="min-h-screen flex items-center justify-center p-4 relative" style="background: linear-gradient(135deg, var(--color-bg-gradient-1) 0%, var(--color-bg-gradient-2) 40%, var(--color-bg-gradient-3) 100%)">
  <!-- Animated glass background -->
  <div class="glass-bg">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
  </div>

  <div class="w-full max-w-md z-10">
    <!-- Glass card -->
    <div class="glassmorphism p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold mb-2" style="color: var(--color-text-primary)">Docent</h1>
        <p style="color: var(--color-text-secondary)">Sign in to your account</p>
      </div>

      <!-- Error Message -->
      @if (errorMessage) {
      <div class="px-4 py-3 rounded-lg mb-6" style="background: var(--color-bg-toast-error, rgba(239,68,68,0.15)); border: 1px solid rgba(239,68,68,0.3); color: var(--color-error)">
        {{ errorMessage }}
      </div>
      }

      <!-- Login Form -->
      <form (ngSubmit)="onLogin()" class="space-y-4">
        <!-- Username Field -->
        <div>
          <label for="username" class="block text-sm font-medium mb-2" style="color: var(--color-text-secondary)">
            Username
          </label>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter your username"
            class="w-full px-4 py-2.5 rounded-xl input-glass border-2 transition focus:outline-none"
            style="border-color: var(--color-border-input); color: var(--color-text-primary)"
          />
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="block text-sm font-medium mb-2" style="color: var(--color-text-secondary)">
            Password
          </label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2.5 rounded-xl input-glass border-2 transition focus:outline-none"
            style="border-color: var(--color-border-input); color: var(--color-text-primary)"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-2.5 px-4 font-semibold rounded-xl transition duration-200 mt-6 disabled:opacity-50 disabled:cursor-not-allowed"
          style="background: var(--color-accent); color: var(--color-bg-primary); border: 1.5px solid var(--color-accent)"
        >
          @if (isLoading) {
          <span class="inline-block animate-spin mr-2">&#9203;</span>
          Signing in...
          } @else {
          Sign In
          }
        </button>
      </form>

      <!-- Demo Credentials -->
      <div class="mt-8 p-4 rounded-lg" style="background: rgba(from var(--color-accent) r g b / 0.1); border: 1px solid rgba(from var(--color-accent) r g b / 0.3)">
        <p class="text-sm mb-2" style="color: var(--color-text-secondary)">
          <strong>Demo Credentials:</strong>
        </p>
        <p class="text-sm" style="color: var(--color-text-muted)">Username: <code class="font-mono px-1.5 py-0.5 rounded" style="background: var(--color-bg-code)">admin</code></p>
        <p class="text-sm" style="color: var(--color-text-muted)">Password: <code class="font-mono px-1.5 py-0.5 rounded" style="background: var(--color-bg-code)">password123</code></p>
      </div>
    </div>
  </div>
</div>
