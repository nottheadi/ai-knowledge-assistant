<form
  class="chat-input-area z-10 flex flex-col gap-1"
  (ngSubmit)="query.trim() && send.emit()"
  aria-label="Chat input form"
>
  <div class="flex items-center gap-2">
    <!-- File Upload -->
    <label class="flex items-center cursor-pointer m-0" aria-label="Upload file">
      <input
        #fileInput
        type="file"
        (change)="fileSelected.emit($event)"
        accept=".pdf"
        class="hidden"
        aria-label="Upload file"
      />
      <button
        type="button"
        (click)="fileInput.click()"
        aria-label="Upload file"
        class="flex items-center justify-center w-10 h-10 rounded-full btn-glass-light border border-[#595959] text-[#A6A6A6] hover:bg-[#595959] hover:text-[#A6A6A6] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#737373] transition mr-2"
        tabindex="0"
        title="Upload PDF (max 10 MB)"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </button>
    </label>

    <!-- Text Input -->
    <input
      [(ngModel)]="query"
      (ngModelChange)="queryChange.emit($event)"
      name="query"
      autocomplete="off"
      placeholder="Ask something from the document..."
      class="flex-1 input-glass border-2 border-[#595959] text-[#A6A6A6] placeholder-[#A6A6A6] font-medium focus-visible:border-[#A6A6A6] focus-visible:ring-2 focus-visible:ring-[#737373] transition rounded-xl px-4 py-2"
      aria-label="Type your message"
    />

    <!-- Send Button -->
    <button
      type="submit"
      [disabled]="!query.trim()"
      class="flex items-center justify-center w-10 h-10 rounded-full bg-[#A6A6A6] text-[#0D0D0D] border border-[#A6A6A6] hover:bg-white hover:border-white disabled:opacity-30 disabled:cursor-not-allowed focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#737373] transition ml-2"
      title="Send"
      aria-label="Send message"
      tabindex="0"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5">
        <path
          d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z"
        />
      </svg>
    </button>
  </div>

  <!-- Upload error -->
  <div
    *ngIf="uploadError"
    class="text-xs text-red-400 pl-14"
    role="alert"
  >{{ uploadError }}</div>
</form>
