<div class="message-list-shell flex-1 overflow-y-auto min-h-0 pr-1">
  <ng-container *ngIf="messages.length === 0">
    <div class="message-empty flex flex-col items-center justify-center h-full py-8" style="color: var(--color-text-muted)">
      <div class="text-2xl mb-2">👋</div>
      <div class="font-semibold text-lg" style="color: var(--color-text-secondary)">Welcome to Docent!</div>
      <div class="text-sm mt-1" style="color: var(--color-text-muted)">Upload a PDF and ask anything about it to get started.</div>
    </div>
  </ng-container>
  <ng-container *ngFor="let msg of messages">
    <app-message-bubble
      [sender]="msg.sender"
      [text]="msg.text"
      [html]="msg.html"
      [sources]="msg.sources"
    ></app-message-bubble>
  </ng-container>
  <div *ngIf="isLoading" class="message-loading-row flex items-center gap-2 mt-2 animate-fade-in" role="status" aria-live="polite">
    <div class="bubble glass-bubble ai typing-indicator premium-bubble">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
    <span class="text-xs loading-phase" style="color: var(--color-text-muted)">
      <ng-container [ngSwitch]="loadingPhase">
        <span *ngSwitchCase="'thinking'">AI is thinking...</span>
        <span *ngSwitchCase="'formatting'">Formatting response...</span>
      </ng-container>
    </span>
  </div>
</div>
